<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function demCapSo(arr, k) {
        let dem = 0;
        for (let i = 0; i < arr.length; i++) {
            for (let j = i + 1; j < arr.length; j++) {
                if ((arr[i] + arr[j]) % k === 0) {
                    dem += 1;
                }

            }
        }
        return dem;
    }
    let danhSachSo = [1, 2, 3, 4, 5, 6];
    let numberK = 5;
    let result = demCapSo(danhSachSo, numberK);
    alert("Số lượng cặp có tổng chia hết cho " + numberK  + " là: " + result);
</script>
</body>
</html>
