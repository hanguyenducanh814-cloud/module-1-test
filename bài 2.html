<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  function roundScore(score) {
    if (score < 48) {
      return score;
    }
    let nextMultipleOf5 = Math.ceil(score / 5) * 5;
    if (nextMultipleOf5 - score < 3) {
      return nextMultipleOf5;
    } else {
      return score;
    }
  }
  alert(roundScore(73));
  alert(roundScore(67));
  alert(roundScore(44));
</script>
</body>
</html>
